name: guardian
on: [pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalacion de Herramientas
        run: npm install -g htmlhint
      - name: Validacion Estatica de HTML
        run: htmlhint "**/*.html"
